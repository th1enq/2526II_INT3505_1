services:
  mongo:
    image: mongo:7
    container_name: product-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: productdb
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    container_name: product-api
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: productdb
      MONGODB_COLLECTION: products

volumes:
  mongo_data:
