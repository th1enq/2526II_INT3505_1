paths:
  /api/v1/users:
    get:
      parameters:
      - in: query
        name: status
        schema:
          type: string
          default: null
          enum:
          - active
          - inactive
          - null
          nullable: true
        required: false
      - in: query
        name: sort
        schema:
          type: string
          default: null
          enum:
          - id
          - name
          - email
          - null
          nullable: true
        required: false
      - in: query
        name: page
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - in: query
        name: limit
        schema:
          type: integer
          default: 10
          minimum: 1
          maximum: 100
        required: false
      responses:
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_CONTENT'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsers'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: List all users
      tags:
      - users
    post:
      responses:
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_CONTENT'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      summary: Create a new user
      tags:
      - users
  /api/v1/users/{user_id}:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Get a single user by ID
      tags:
      - users
    put:
      responses:
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_CONTENT'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      summary: Replace a user entirely (full update)
      tags:
      - users
    delete:
      responses:
        '204':
          description: No Content
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Delete a user by ID
      tags:
      - users
    parameters:
    - in: path
      name: user_id
      required: true
      schema:
        type: integer
        minimum: 0
  /api/v1/orders:
    get:
      parameters:
      - in: query
        name: status
        schema:
          type: string
          default: null
          enum:
          - pending
          - completed
          - cancelled
          - null
          nullable: true
        required: false
      - in: query
        name: user_id
        schema:
          type: integer
          default: null
          nullable: true
        required: false
      - in: query
        name: sort
        schema:
          type: string
          default: null
          enum:
          - id
          - amount
          - product
          - null
          nullable: true
        required: false
      - in: query
        name: page
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - in: query
        name: limit
        schema:
          type: integer
          default: 10
          minimum: 1
          maximum: 100
        required: false
      responses:
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_CONTENT'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrders'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: List all orders
      tags:
      - orders
    post:
      responses:
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_CONTENT'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
      summary: Create a new order
      tags:
      - orders
  /api/v1/orders/{order_id}:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Get a single order by ID
      tags:
      - orders
    put:
      responses:
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_CONTENT'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
      summary: Replace an order entirely (full update)
      tags:
      - orders
    delete:
      responses:
        '204':
          description: No Content
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Delete an order by ID
      tags:
      - orders
    parameters:
    - in: path
      name: order_id
      required: true
      schema:
        type: integer
        minimum: 0
info:
  title: REST API Design Principles Demo
  version: v1
tags:
- name: users
  description: Operations on user resources
- name: orders
  description: Operations on order resources
openapi: 3.0.3
components:
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          description: Error code
        status:
          type: string
          description: Error name
        message:
          type: string
          description: Error message
        errors:
          type: object
          description: Errors
          additionalProperties: {}
      additionalProperties: false
    PaginationMetadata:
      type: object
      properties:
        total:
          type: integer
        total_pages:
          type: integer
        first_page:
          type: integer
        last_page:
          type: integer
        page:
          type: integer
        previous_page:
          type: integer
        next_page:
          type: integer
      additionalProperties: false
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        name:
          type: string
          example: Alice
        email:
          type: string
          format: email
          example: alice@example.com
        status:
          type: string
          default: active
          enum:
          - active
          - inactive
          example: active
      required:
      - email
      - name
      additionalProperties: false
    PaginatedUsers:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
      additionalProperties: false
    Order:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        user_id:
          type: integer
          example: 1
        product:
          type: string
          example: Laptop
        amount:
          type: number
          example: 1200.0
        status:
          type: string
          default: pending
          enum:
          - pending
          - completed
          - cancelled
          example: pending
      required:
      - amount
      - product
      - user_id
      additionalProperties: false
    PaginatedOrders:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
      additionalProperties: false
  responses:
    UNPROCESSABLE_CONTENT:
      description: Unprocessable Content
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    DEFAULT_ERROR:
      description: Default error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
