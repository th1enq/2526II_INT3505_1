name: CI-CD Flask Demo (Week 8)

on:
  pull_request:
    branches: ["main"]
    paths:
      - "Week_8_DemoCode/**"
      - ".github/workflows/ci-cd.yml"
  push:
    branches: ["main"]
    paths:
      - "Week_8_DemoCode/**"
      - ".github/workflows/ci-cd.yml"
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Week_8_DemoCode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        run: pytest -q

  api-tests-newman:
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: Week_8_DemoCode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm ci
      - name: Start Flask app
        run: |
          nohup python run.py > flask.log 2>&1 &
          sleep 3
      - name: Run Newman tests
        run: npm run test:api

  performance-tests-k6:
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: Week_8_DemoCode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Setup k6
        uses: grafana/setup-k6-action@v1
      - name: Start Flask app
        run: |
          nohup python run.py > flask.log 2>&1 &
          sleep 3
      - name: Run k6 performance test
        run: k6 run performance/k6-smoke.js

  deploy:
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests-newman, performance-tests-k6]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy placeholder
        run: echo "All tests passed. Add your real deploy command here."
